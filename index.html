<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>认知需求量表 (NCS-18) | 智性交互测评</title>
    <meta name="description" content="专业认知需求量表交互测评，探索你的智性好奇心与思考偏好。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.font.im/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-glow"></div>
    
    <main class="container">
        <header class="hero">
            <h1 id="main-title">认知需求量表 <span class="accent">(NCS-18)</span></h1>
            <p class="subtitle">请根据您的实际情况，对以下 18 个描述进行评分。探索您对复杂思考的偏好程度。</p>
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
                <span class="progress-text" id="progress-text">进度: 0/18</span>
            </div>
        </header>

        <section id="quiz-section" class="quiz-card">
            <form id="ncs-form">
                <div id="questions-wrapper">
                    <div id="questions-container">
                        <!-- Current question will be injected here -->
                    </div>
                </div>
                
                <div class="form-navigation">
                    <button type="button" id="prev-btn" class="nav-btn" disabled>上一题</button>
                    <div class="step-indicator" id="step-indicator">1 / 18</div>
                    <button type="button" id="next-btn" class="nav-btn" disabled>下一题</button>
                </div>
                
                <div class="form-footer">
                    <button type="submit" id="submit-btn" class="primary-btn" disabled>提交并计算得分</button>
                </div>
            </form>
        </section>

        <section id="result-section" class="result-card hidden">
            <div class="result-header">
                <h2>测评结果</h2>
                <div class="score-visual-wrapper">
                    <div class="gauge-container">
                        <svg class="gauge-svg" viewBox="0 0 200 120">
                            <defs>
                                <linearGradient id="gauge-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                    <stop offset="0%" stop-color="#7c4dff" />
                                    <stop offset="100%" stop-color="#00b0ff" />
                                </linearGradient>
                            </defs>
                            <path class="gauge-bg" d="M20,100 A80,80 0 0,1 180,100" />
                            <path id="gauge-fill" class="gauge-fill" d="M20,100 A80,80 0 0,1 180,100" />
                            <!-- Needle -->
                            <g id="needle-group" class="needle-group">
                                <path class="needle" d="M100,100 L100,35" />
                                <circle class="needle-pivot-outer" cx="100" cy="100" r="6" />
                                <circle class="needle-pivot-inner" cx="100" cy="100" r="2" />
                            </g>
                        </svg>
                        <div class="score-display">
                            <div class="score-main">
                                <span id="final-score" class="score-value">0</span>
                                <div class="score-total">
                                    <span class="score-slash">/</span>
                                    <span class="score-max">90</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="result-content">
                <div class="result-main-info">
                    <h3 id="result-title">评估中...</h3>
                    <div id="confidence-warning" class="warning-box hidden"></div>
                    <p id="result-description"></p>
                    <div id="fuzzy-description" class="fuzzy-box hidden"></div>
                </div>

                <div class="dimensions-container">
                    <div class="radar-chart-wrapper">
                        <svg id="radar-chart" class="radar-svg" viewBox="0 0 200 200">
                            <!-- Radar layers will be injected here -->
                        </svg>
                        <div class="dimension-labels">
                            <span class="dim-label d1">复杂性偏好</span>
                            <span class="dim-label d2">认知坚持性</span>
                            <span class="dim-label d3">思考乐趣</span>
                        </div>
                    </div>
                    <div class="dimension-details" id="dimension-details">
                        <!-- Details will be injected here -->
                    </div>
                </div>
                
                <div class="reference-box">
                    <h4>结果参考</h4>
                    <ul>
                        <li><span class="label high">🎯 高认知需求 (≥72):</span> 享受智力挑战，主动分析高难度信息。</li>
                        <li><span class="label medium">⚖️ 中等认知需求 (46-71):</span> 平衡思考投入，根据重要程度分配资源。</li>
                        <li><span class="label low">⚡ 低认知需求 (≤45):</span> 倾向直觉经验，偏好无需过度脑力的任务。</li>
                    </ul>
                </div>
            </div>

            <div class="result-actions">
                <button id="restart-btn" class="secondary-btn">重新测评</button>
                <div id="time-spent" class="time-footer">耗时: --</div>
            </div>
        </section>
    </main>



    <script src="app.js"></script>
</body>
</html>
